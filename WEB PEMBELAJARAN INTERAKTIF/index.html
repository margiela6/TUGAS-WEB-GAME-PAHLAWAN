<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arsip Digital Indonesia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-[#1a130f] overflow-hidden select-none">
    <div id="desk" class="relative w-screen h-screen bg-[#1a130f]">
      <div
        class="absolute inset-0 z-0 opacity-40 pointer-events-none"
        style="background-image: url(&quot;background.png&quot;)"
      ></div>

      <header
        class="fixed top-12 left-0 w-full z-10 text-center pointer-events-none"
      >
        <h1
          class="text-[#f4e4bc] text-6xl font-serif uppercase tracking-widest opacity-20"
        >
          Arsip Perjuangan
        </h1>
      </header>

      <div
        class="fixed top-8 right-8 z-50 bg-[#f4e4bc]/90 p-4 border-l-4 border-[#bc6c25] shadow-2xl font-mono text-[10px] text-[#5d2e0a]"
      >
        <p class="font-bold border-b border-[#bc6c25] mb-2 pb-1 uppercase">
          Tim Peneliti (Anggota Kelompok)
        </p>
        <ul class="space-y-1 opacity-80">
          <li>• Noor Refa .F (2405176008)</li>
          <li>• Fatmawati (2405176012)</li>
          <li>• Pasha Ridho .P.S (2405176016)</li>
          <li>• Jason R.R (2405176032)</li>
        </ul>
      </div>

      <div id="artifact-container" class="relative w-full h-full z-20"></div>

      <button
        id="music-btn"
        class="fixed bottom-10 left-10 z-[100] bg-[#2d1e13] border-2 border-[#bc6c25] p-5 rounded-full shadow-2xl text-white hover:scale-110 transition-transform"
      >
        <span id="music-icon">🔈</span>
      </button>
    </div>

    <div
      id="info-panel"
      class="fixed top-0 right-0 h-full w-full md:w-[450px] bg-[#fdfaf1] shadow-2xl z-[500] translate-x-full transition-transform duration-500 border-l-[12px] border-[#bc6c25] p-10 overflow-y-auto"
    >
      <button
        onclick="closeInfo()"
        class="text-3xl font-bold text-[#5d2e0a] mb-8"
      >
        ✕
      </button>

      <div
        class="w-full h-64 bg-[#ddd] mb-8 overflow-hidden rounded shadow-inner border border-black/10"
      >
        <img
          id="info-img"
          src=""
          alt="Detail Gambar"
          class="w-full h-full object-cover"
        />
      </div>

      <h2
        id="info-title"
        class="text-4xl font-serif font-black text-[#5d2e0a] mb-6 uppercase border-b-2 border-[#bc6c25] pb-4"
      ></h2>
      <p
        id="info-desc"
        class="text-xl text-[#283618] leading-relaxed italic text-justify"
      ></p>
    </div>

    <audio id="bg-audio" loop preload="none">
      <source src="backsound.mpeg" type="audio/mpeg" />
    </audio>

    <script src="script.js"></script>
  </body>
</html>
